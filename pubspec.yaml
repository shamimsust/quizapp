name: exam_platform
description: Fully scaffolded Flutter + Firebase RTDB exam platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # --- ADDED THIS TO FIX THE ANALYZER ERROR ---
  flutter_web_plugins: 
    sdk: flutter
  
  flutter_localizations: 
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Firebase Core & Auth
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_database: ^11.0.0
  firebase_storage: ^12.1.0
  
  http: ^1.1.0
  
  # Image Picking
  image_picker: ^1.1.2
  image_picker_for_web: ^3.0.5
  
  # State & Routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  
  # Math & UI
  flutter_math_fork: ^0.7.2
  math_keyboard: ^0.3.0
  uuid: ^4.3.3
  google_fonts: ^6.2.1
  intl: ^0.20.2 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/fonts/

  fonts:
    - family: SolaimanLipi
      fonts:
        - asset: assets/fonts/SolaimanLipi.ttf