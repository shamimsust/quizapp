name: exam_platform
description: Fully scaffolded Flutter + Firebase RTDB exam platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Firebase Core & Auth
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_database: ^12.2.0
  
  # NEW: Firebase Storage for images
  firebase_storage: ^13.2.0
  http: ^1.1.0
  
  # NEW: Image Picking for Editor
  image_picker: ^1.1.2
  
  # State & Routing
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  
  # Math & UI
  flutter_math_fork: ^0.7.2
  math_keyboard: ^0.3.0
  uuid: ^4.3.3
  google_fonts: ^8.0.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: SolaimanLipi
      fonts:
        - asset: assets/fonts/SolaimanLipi.ttf